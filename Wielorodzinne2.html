      /* Sekcja na film pod galerią */
      .sekcja-dron {
        max-width: 1140px;
        margin: 30px auto 30px auto;
        padding: 0 15px;
        display: flex;
        justify-content: center;
      }
      .kontener-film-169 {
        width: 100%;
        max-width: 800px; /* Optymalna szerokość dla filmu 16:9 na komputerach */
        aspect-ratio: 16 / 9; /* Wymuszenie formatu panoramicznego 16:9 */
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        background-color: #000;
      }
      .kontener-film-169 video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Obraz ładnie wypełnia odtwarzacz bez zniekształceń */
      }

      /* Nadpisanie i wymuszenie równego układu dla zdjęć */
      .galeria {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)) !important;
        gap: 15px !important;
        max-width: 1140px !important;
        margin: 20px auto !important;
        padding: 0 15px !important;
      }
      .galeria img {
        width: 100% !important;
        height: 200px !important; /* Stała wysokość dla każdego zdjęcia */
        object-fit: cover !important; /* Ładne kadrowanie miniatury */
        border-radius: 8px !important;
        cursor: pointer !important;
        transition: transform 0.2s ease !important;
        display: block !important;
        margin: 0 !important;
      }
      .galeria img:hover {
        transform: scale(1.03);
      }

    "assets/img/realizacje/BUDOWNICTWO WIELORODZINNE/PXL_20260516_051304129.jpg",
    "assets/img/realizacje/BUDOWNICTWO WIELORODZINNE/PXL_20260521_121204984.jpg",
    "assets/img/realizacje/BUDOWNICTWO WIELORODZINNE/PXL_20260521_121207295.jpg",
    "assets/img/realizacje/BUDOWNICTWO WIELORODZINNE/PXL_20260521_121210509.jpg",
    "assets/img/realizacje/BUDOWNICTWO WIELORODZINNE/PXL_20260609_053639223.jpg"
  ];
  let aktualnyIndex = 0;

  function pokazZdjecie(index) {
    aktualnyIndex = index;
    const lightbox = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");
    img.src = zdjecia[index];
    lightbox.style.display = "flex";
  }

  function ukryjZdjecie() {
    document.getElementById("lightbox").style.display = "none";
  }

  function prevZdjecie(e) {
    e.stopPropagation();
    aktualnyIndex = (aktualnyIndex - 1 + zdjecia.length) % zdjecia.length;
    document.getElementById("lightbox-img").src = zdjecia[aktualnyIndex];
  }

  function nextZdjecie(e) {
    e.stopPropagation();
    aktualnyIndex = (aktualnyIndex + 1) % zdjecia.length;
    document.getElementById("lightbox-img").src = zdjecia[aktualnyIndex];
  }
</script>

<script>
document.addEventListener("keydown", function (e) {
  const lightbox = document.getElementById("lightbox");

  if (lightbox.style.display !== "flex") return;

  if (e.key === "ArrowRight") {
    nextZdjecie(e);
  }

  if (e.key === "ArrowLeft") {
    prevZdjecie(e);
  }

  if (e.key === "Escape") {
    ukryjZdjecie();
  }
});
</script>

<script>
let startX = 0;
let endX = 0;

const lightbox = document.getElementById("lightbox");

lightbox.addEventListener("touchstart", function (e) {
  startX = e.touches[0].clientX;
});

lightbox.addEventListener("touchend", function (e) {
  endX = e.changedTouches[0].clientX;
  handleSwipe();
});

function handleSwipe() {
  const diff = startX - endX;

  if (Math.abs(diff) < 50) return;

  if (diff > 0) {
    nextZdjecie(new Event("swipe"));
  } else {
    prevZdjecie(new Event("swipe"));
  }
}
</script>
